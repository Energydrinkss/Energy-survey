<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Consumer Survey · Energy Drinks · Madrid 2026</title>
  <style>
    :root {
      --red:    #CC0000;
      --navy:   #2C3E50;
      --dark:   #1A1A1A;
      --mid:    #555;
      --light:  #F5F5F5;
      --silver: #DDD;
      --amber:  #B7770D;
      --white:  #FFF;
      --green:  #1E6B3A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: Arial, Helvetica, sans-serif; background: #EBEBEB; min-height: 100vh; color: var(--dark); }

    /* ── App shell ─────────────────────────────────────────────────── */
    #app { max-width: 680px; margin: 0 auto; background: white; min-height: 100vh; position: relative; }

    /* ── Sticky header ─────────────────────────────────────────────── */
    #topbar {
      position: sticky; top: 0; z-index: 200;
      background: var(--navy);
      border-bottom: 3px solid var(--red);
    }
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px;
    }
    .hd-left { display: flex; align-items: center; gap: 10px; }
    .hd-logo { font-size: 20px; font-weight: 900; color: var(--red); letter-spacing: 2px; }
    .hd-title { font-size: 11px; color: #AAA; line-height: 1.4; }
    #pct-label { font-size: 12px; color: #AAA; min-width: 32px; text-align: right; }
    #progress-bar-track { height: 3px; background: rgba(255,255,255,0.15); }
    #progress-bar-fill { height: 3px; background: var(--red); width: 0%; transition: width 0.4s ease; }

    /* ── Screen ────────────────────────────────────────────────────── */
    #screen { padding: 24px 20px 110px; animation: fadeUp 0.25s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    /* ── Section banner ────────────────────────────────────────────── */
    .sec-banner { display:flex; border-radius:6px; overflow:hidden; margin-bottom:18px; }
    .sec-code { background:var(--red); color:white; font-weight:bold; font-size:15px; padding:10px 14px; display:flex; align-items:center; flex-shrink:0; }
    .sec-info { background:var(--navy); color:white; padding:10px 16px; flex:1; }
    .sec-title { font-size:14px; font-weight:bold; }
    .sec-sub { font-size:11px; color:#AAAAAA; margin-top:2px; font-style:italic; }

    /* ── Question header ───────────────────────────────────────────── */
    .q-num { font-size:12px; font-weight:bold; color:var(--red); margin-bottom:5px; text-transform:uppercase; letter-spacing:1px; }
    .q-text { font-size:18px; font-weight:bold; color:var(--dark); line-height:1.4; margin-bottom:6px; }
    .q-type-label { font-size:12px; color:#999; font-style:italic; margin-bottom:10px; }
    .q-note { font-size:13px; color:var(--mid); font-style:italic; padding:9px 13px; background:#FFFCF0; border-left:3px solid var(--amber); border-radius:0 5px 5px 0; margin-bottom:14px; }
    .info-bar { font-size:13px; color:var(--mid); font-style:italic; padding:10px 14px; background:#FFF8F8; border-left:4px solid var(--red); border-radius:0 5px 5px 0; margin-bottom:16px; }

    /* ── Options ───────────────────────────────────────────────────── */
    .opts { margin-top:10px; }
    .opt {
      display:flex; align-items:flex-start; gap:12px;
      padding:12px 14px; border:1.5px solid var(--silver); border-radius:8px;
      margin-bottom:8px; cursor:pointer; transition:all 0.15s; user-select:none;
    }
    .opt:hover { border-color:#E0A0A0; background:#FFF5F5; }
    .opt.sel { border-color:var(--red); background:#FFF0F0; }
    .opt-dot {
      width:20px; height:20px; border:2px solid var(--silver); border-radius:50%;
      flex-shrink:0; margin-top:1px; transition:all 0.15s; position:relative;
    }
    .opt.sel .opt-dot { border-color:var(--red); background:var(--red); }
    .opt.sel .opt-dot::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:7px; height:7px; background:white; border-radius:50%; }
    .opt-box {
      width:20px; height:20px; border:2px solid var(--silver); border-radius:4px;
      flex-shrink:0; margin-top:1px; transition:all 0.15s; position:relative;
    }
    .opt.sel .opt-box { border-color:var(--red); background:var(--red); }
    .opt.sel .opt-box::after { content:'✓'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:white; font-size:11px; font-weight:bold; }
    .opt-lbl { font-size:15px; color:var(--dark); flex:1; line-height:1.35; }
    .other-input {
      width:100%; margin-top:8px; padding:9px 12px; border:1.5px solid var(--silver);
      border-radius:6px; font-size:14px; font-family:Arial; display:none; background:white;
    }
    .other-input.show { display:block; }
    .sel-counter { font-size:12px; color:var(--mid); margin-bottom:8px; }
    .sel-counter b { color:var(--red); }

    /* ── Text inputs ───────────────────────────────────────────────── */
    .txt-row { margin-bottom:12px; }
    .txt-lbl { font-size:12px; color:var(--mid); margin-bottom:4px; }
    .txt-inp {
      width:100%; padding:11px 14px; border:1.5px solid var(--silver);
      border-radius:8px; font-size:15px; font-family:Arial; outline:none; transition:border-color 0.2s;
    }
    .txt-inp:focus { border-color:var(--red); }

    /* ── 1–10 Scale ────────────────────────────────────────────────── */
    .scale-wrap { display:flex; gap:5px; flex-wrap:wrap; margin-top:12px; }
    .sc-btn {
      width:calc(10% - 5px); min-width:30px; padding:11px 0;
      border:1.5px solid var(--silver); border-radius:6px; text-align:center;
      font-size:15px; font-weight:bold; cursor:pointer; transition:all 0.15s; background:white;
    }
    .sc-btn:hover { border-color:var(--red); background:#FFF5F5; }
    .sc-btn.sel { border-color:var(--red); background:var(--red); color:white; }
    .scale-ends { display:flex; justify-content:space-between; margin-top:7px; font-size:11px; color:var(--mid); }

    /* ── Matrix ────────────────────────────────────────────────────── */
    .matrix-hint { font-size:11px; color:#999; text-align:center; padding:5px; background:#F9F9F9; display:none; }
    @media(max-width:580px){ .matrix-hint { display:block; } }
    .matrix-outer { overflow-x:auto; -webkit-overflow-scrolling:touch; border:1px solid var(--silver); border-radius:8px; margin-top:12px; }
    table.mx { border-collapse:collapse; min-width:540px; width:100%; }
    table.mx th { background:var(--navy); color:white; padding:9px 8px; font-size:12px; text-align:center; border:1px solid #3A4F63; white-space:nowrap; }
    table.mx th:first-child { text-align:left; min-width:180px; padding-left:12px; }
    table.mx td { padding:7px 6px; border:1px solid #E8E8E8; font-size:13px; vertical-align:middle; }
    table.mx tr:nth-child(even) td { background:#FAFAFA; }
    table.mx td:first-child { padding-left:12px; font-weight:500; }
    .mc {
      width:32px; height:32px; border:2px solid var(--silver); border-radius:5px;
      cursor:pointer; margin:0 auto; display:flex; align-items:center; justify-content:center;
      transition:all 0.15s; position:relative;
    }
    .mc:hover { border-color:var(--red); }
    .mc.sel { border-color:var(--red); background:var(--red); }
    .mc.sel::after { content:'✓'; color:white; font-size:13px; font-weight:bold; }
    .mc.radio { border-radius:50%; }
    .mc.radio.sel::after { content:''; width:12px; height:12px; background:white; border-radius:50%; display:block; }

    /* ── Navigation bar ────────────────────────────────────────────── */
    #nav {
      position:fixed; bottom:0; left:50%; transform:translateX(-50%);
      width:100%; max-width:680px; background:white;
      border-top:1px solid var(--silver); padding:10px 18px;
      display:flex; gap:10px; z-index:100;
    }
    .btn-back {
      padding:12px 18px; border:1.5px solid var(--silver); border-radius:8px;
      background:white; font-size:15px; color:var(--mid); cursor:pointer; font-family:Arial;
      transition:all 0.15s;
    }
    .btn-back:hover { border-color:#AAA; color:var(--dark); }
    .btn-next {
      flex:1; padding:13px 20px; border:none; border-radius:8px;
      background:var(--red); color:white; font-size:16px; font-weight:bold;
      cursor:pointer; font-family:Arial; transition:background 0.15s;
    }
    .btn-next:hover { background:#AA0000; }
    .btn-next:active { background:#880000; }

    /* ── Validation error ──────────────────────────────────────────── */
    .err { color:var(--red); font-size:13px; margin-top:10px; display:none; }
    .err.show { display:block; }

    /* ── Welcome screen ────────────────────────────────────────────── */
    .welcome { padding:32px 20px 110px; text-align:center; }
    .wlc-logo { font-size:46px; font-weight:900; color:var(--red); letter-spacing:3px; margin-bottom:2px; }
    .wlc-wings { font-size:13px; color:var(--mid); font-style:italic; margin-bottom:28px; }
    .wlc-title { font-size:22px; font-weight:bold; color:var(--navy); margin-bottom:8px; line-height:1.3; }
    .wlc-sub { font-size:13px; color:var(--mid); font-style:italic; margin-bottom:24px; }
    .wlc-intro { text-align:left; background:#FFF8F8; border-left:4px solid var(--red); padding:14px 16px; border-radius:0 8px 8px 0; font-size:14px; color:var(--dark); line-height:1.65; margin-bottom:22px; }
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:10px; }
    .stat { background:var(--light); border-radius:8px; padding:10px 6px; }
    .stat-l { font-size:10px; color:var(--mid); font-weight:bold; text-transform:uppercase; letter-spacing:0.5px; }
    .stat-v { font-size:13px; color:var(--navy); font-weight:bold; margin-top:3px; }

    /* ── Thank you screen ──────────────────────────────────────────── */
    .thankyou { padding:50px 24px; text-align:center; }
    .ty-icon { font-size:60px; margin-bottom:18px; }
    .ty-title { font-size:28px; font-weight:bold; color:var(--navy); margin-bottom:8px; }
    .ty-line { font-size:16px; color:var(--red); font-style:italic; margin-bottom:24px; }
    .ty-note { font-size:14px; color:var(--mid); line-height:1.7; }
  </style>
</head>
<body>
<div id="app">

  <!-- Sticky header + progress -->
  <div id="topbar">
    <div id="header">
      <div class="hd-left">
        <div class="hd-logo" style="font-size:15px;letter-spacing:1px;color:#AAA;font-weight:600;">Consumer Survey</div>
        <div class="hd-title" style="color:#888;">Energy Drinks &middot; Madrid 2026</div>
      </div>
      <div id="pct-label"></div>
    </div>
    <div id="progress-bar-track"><div id="progress-bar-fill"></div></div>
  </div>

  <!-- Question area -->
  <div id="screen"></div>

  <!-- Nav buttons -->
  <div id="nav">
    <button class="btn-back" id="btn-back" onclick="goBack()">← Back</button>
    <button class="btn-next" id="btn-next" onclick="goNext()">Start Survey →</button>
  </div>

</div><!-- #app -->

<script>
// ═══════════════════════════════════════════════════════════════════════
// ▶  CONFIGURATION — paste your Apps Script URL below after setup
// ═══════════════════════════════════════════════════════════════════════
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzCSOp8qBAWOP8uuhozautVC3A9gDHAcOl0-ETu-exxsszdvduZyllKgd2wngdOWQftTg/exec';

// ═══════════════════════════════════════════════════════════════════════
// BRAND LISTS
// ═══════════════════════════════════════════════════════════════════════
const BRANDS_M  = ['Red Bull','Monster','Burn','Rockstar','Hell Energy','Prime Energy','Celsius','Bang Energy','Private Label (e.g. Hacendado)','Other'];
const BRANDS_S  = ['Red Bull','Monster','Burn','Rockstar','Hell Energy','Prime Energy','Celsius','Bang Energy','Private Label (e.g. Hacendado)','No strong preference','Other'];

// ═══════════════════════════════════════════════════════════════════════
// QUESTION DATA
// ═══════════════════════════════════════════════════════════════════════
const QS = {

  WELCOME: { id:'WELCOME', type:'welcome' },

  // ── SCREENER: demographics first, then consumption filter ───────────
  Q1:  { id:'Q1',  sec:'S', secTitle:'Screener',
         text:'How old are you?',
         type:'single', req:true,
         opts:['Under 18','18 to 24','25 to 30','31 to 35','36 or older'] },

  Q2:  { id:'Q2',  sec:'S', secTitle:'Screener',
         text:'What is your gender?',
         type:'single', req:true,
         opts:['Male','Female','Non-binary or other','Prefer not to say'] },

  Q3:  { id:'Q3',  sec:'S', secTitle:'Screener',
         text:'Where are you from?',
         type:'single', req:true,
         opts:['Spain','Rest of Europe (not Spain)','Latin America','Asia','Africa or Middle East','Other'] },

  Q4:  { id:'Q4',  sec:'S', secTitle:'Screener',
         text:'Have you consumed any energy drink in the last 3 months?',
         type:'single', req:true,

  // ── SECTION A: CATEGORY HABITS ──────────────────────────────────────
  Q5:  { id:'Q5',  sec:'A', secTitle:'Category Habits',

         type:'single', req:true,
         opts:['Every day','Several times a week','About once a week','A few times a month','Less than once a month'] },

  Q6:  { id:'Q6',  sec:'A', secTitle:'Category Habits',
         text:'How much do you usually spend per can?',
         type:'single', req:true,
         opts:['Less than €1.00','€1.00 to €1.49','€1.50 to €1.99','€2.00 to €2.49','€2.50 or more'] },

  Q7:  { id:'Q7',  sec:'A', secTitle:'Category Habits',
         text:'Where do you usually buy energy drinks?',
         type:'multi', req:true,
         opts:['Supermarket (Mercadona, Carrefour, Lidl, etc.)','Convenience store or 24h shop','Bar or nightclub','Gym','Petrol station','Delivery app (Glovo, Just Eat, etc.)','Vending machine','Other'] },

  Q8:  { id:'Q8',  sec:'A', secTitle:'Category Habits',
         text:'In which situations do you usually consume energy drinks?',
         type:'multi', req:true,
         opts:['Studying or working (focus and productivity)','Before or during sport or gym','Morning: to start the day','Afternoon: to avoid an energy dip','Before going out at night','During nightlife (bar, club, festival)','Gaming or long screen sessions','On long trips (driving, travel)','Mixed into an alcoholic drink','Other'] },

         type:'multi', req:true,
         opts:['Coffee or espresso','Iced coffee or cold brew','Tea','Soft drink (Coca-Cola, Pepsi, etc.)','Water','Protein shake or pre-workout','Food or snack','Nothing, I always choose an energy drink','Other'],
         noneOpts:['Nothing, I always choose an energy drink'] },

  Q10: { id:'Q10', sec:'A', secTitle:'Category Habits',
         text:'What are the main reasons you buy energy drinks?',
         type:'multi', req:true, max:3,
         note:'Think about the category in general, not a specific brand.',
         opts:['I need an energy boost to get through the day','To improve my sport or gym performance','To stay focused while studying or working','To stay out late and last longer at night','I enjoy the taste','It was available and I did not have another option','Social: friends drink them','The image and lifestyle they represent','Price and good value','Other'] },

  // ── SECTION B: BRAND AWARENESS ──────────────────────────────────────
  Q11: { id:'Q11', sec:'B', secTitle:'Brand Awareness',
         text:'What energy drink brands come to mind?',
         type:'textN', req:true,
         note:'Write in order: the first brand that comes to mind goes in position 1.',
         labels:['1. First brand that comes to mind','2.','3.','4.','5.'] },

  Q12: { id:'Q12', sec:'B', secTitle:'Brand Awareness',
         info:'Now we will show you a list of brands.',
         text:'Which of these brands have you consumed in the last 3 months?',
         type:'multi', req:true,

         noneOpts:['None of the above'] },

  Q13: { id:'Q13', sec:'B', secTitle:'Brand Awareness',
         text:'Which is your preferred energy drink brand?',
         type:'single', req:true,
         opts:BRANDS_S },

  // ── SECTION C: RED BULL DEEP DIVE ──────────────────────────────────
  // Shown only if Red Bull selected in Q12
  Q14: { id:'Q14', sec:'C', secTitle:'Red Bull Deep Dive', secSub:'About your Red Bull consumption',
         text:'How often do you specifically drink Red Bull?',
         type:'single', req:true,
         opts:['Daily or almost daily','Several times a week','About once a week','A few times a month','Rarely: less than once a month'] },

  Q15: { id:'Q15', sec:'C', secTitle:'Red Bull Deep Dive',
         text:'Which Red Bull formats or variants have you actually tried?',

         noneOpts:['Only the Original, I have not tried any others'] },

  Q16: { id:'Q16', sec:'C', secTitle:'Red Bull Deep Dive',
         text:'What do you like about Red Bull?',
         type:'multi', req:true, max:3,

         opts:['The taste','The energy effect: it works well for me','It is the most trusted and original brand','The image and lifestyle it represents','It is always available wherever I am','Habit: I have always drunk it','It is what is served at bars and events I go to','The variety of options (Sugarfree, Zero, Editions)','Other'] },

// ═══════════════════════════════════════════════════════════════════════
// FLOW DEFINITIONS
// ═══════════════════════════════════════════════════════════════════════
const MAIN_FLOW = ['WELCOME','Q1','Q2','Q3','Q4','Q5','Q6','Q7','Q8','Q9','Q10','Q11','Q12','Q13','Q14','Q15','Q16','Q17','Q18','Q19','Q20','Q21','Q22','Q23','THANKYOU'];
const ND_FLOW   = ['ND1','ND2','ND3','THANKYOU_ND'];
const TOTAL_MAIN = MAIN_FLOW.filter(id => id.startsWith('Q')).length; // 23

// ═══════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════
let hist = ['WELCOME'];
let answers = {};

function cur() { return hist[hist.length - 1]; }

// ═══════════════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════════════
function nextId(fromId) {
  // Q4 = consumption filter: No -> ND block, Yes -> Q5
  if (fromId === 'Q4') {
    return (answers['Q4'] || '').startsWith('No') ? 'ND1' : 'Q5';
  }
  // Q12 is now primary for Q12+Q13 group — route after based on RB consumption
  if (fromId === 'Q12') {
    const consumed = answers['Q12'] || [];
    const rbDrinker = Array.isArray(consumed) && consumed.some(v => v === 'Red Bull');
    return rbDrinker ? 'Q14' : 'Q18';
  }
  // Q18 = brand matrix: RB consumers go to Q19 (which includes Q20-Q23), others go to Q19 too
  // but Q19 (RB ratings) is conditionally rendered inside the group
  if (fromId === 'Q18') {
    return 'Q19';
  }
  // ND flow — all 3 questions on one screen, submits directly
  if (fromId === 'ND1') return 'THANKYOU_ND';
  if (fromId.startsWith('ND')) return 'THANKYOU_ND';
  // Main flow — skip questions that are rendered as part of a group
  let i = MAIN_FLOW.indexOf(fromId);
  if (i < 0) return null;
  let nextIdx = i + 1;
  while (nextIdx < MAIN_FLOW.length - 1 && GROUP_SECONDARY.has(MAIN_FLOW[nextIdx])) {
    nextIdx++;
  }
  return nextIdx < MAIN_FLOW.length ? MAIN_FLOW[nextIdx] : null;
}

function goNext() {
  const id = cur();
  if (id === 'WELCOME') { hist.push('Q1'); return render(); }
  if (id === 'THANKYOU' || id === 'THANKYOU_ND') return;

  const q = QS[id];
  if (!q) return;

  // Validate all questions on this screen (grouped or single)
  const screenQs = GROUPS[id] ? GROUPS[id].map(gid => QS[gid]).filter(Boolean).filter(sq => !sq.showIf || sq.showIf()) : [q];
  let allValid = true;
  screenQs.forEach(sq => {
    if (!validate(sq)) {
      const el = document.getElementById('err-' + sq.id);
      if (el) el.classList.add('show');
      allValid = false;
    } else {
      clearErr(sq.id);
    }
  });
  if (!allValid) return;

  const nxt = nextId(id);
  if (!nxt) return;

  if (nxt === 'THANKYOU' || nxt === 'THANKYOU_ND') {
    submitSurvey(nxt);
  } else {
    hist.push(nxt);
    render();
    window.scrollTo(0, 0);
  }
}

function goBack() {
  if (hist.length <= 1) return;
  hist.pop();
  render();
  window.scrollTo(0, 0);
}

// ═══════════════════════════════════════════════════════════════════════
// VALIDATION
// ═══════════════════════════════════════════════════════════════════════
function validate(q) {
  if (!q.req) return true;
  const a = answers[q.id];
  switch (q.type) {
    case 'single':  return !!(a && String(a).trim());
    case 'multi':   return !!(a && a.length > 0);
    case 'text1':   return !!(a && String(a).trim());
    case 'textN':   return q.req ? !!(a && a[0] && a[0].trim()) : true;
    case 'scale10': return a !== undefined && a !== null;
    case 'matrix-multi':  return !!(a && q.rows.every(r => a[r] && a[r].length > 0));
    case 'matrix-scale': return !!(a && q.rows.every(r => a[r] !== undefined));
    default: return true;
  }
}

function clearErr(id) {
  const el = document.getElementById('err-' + id);
  if (el) el.classList.remove('show');
}

// ═══════════════════════════════════════════════════════════════════════
// ANSWER HANDLERS (called from inline onclick)
// ═══════════════════════════════════════════════════════════════════════
function pickSingle(el) {
  const qId = el.dataset.q; const val = el.dataset.val;
  answers[qId] = val;
  document.querySelectorAll('[data-q="' + qId + '"]').forEach(o => o.classList.remove('sel'));
  el.classList.add('sel');
  const inp = document.getElementById('oi-' + qId);
  if (inp) {
    if (val === 'Other') { inp.classList.add('show'); inp.focus(); }
    else { inp.classList.remove('show'); inp.value = ''; }
  }
  clearErr(qId);
}

function pickMulti(el) {
  const qId = el.dataset.q; const val = el.dataset.val; const max = el.dataset.max ? parseInt(el.dataset.max) : null;
  if (!answers[qId]) answers[qId] = [];
  const arr = answers[qId];
  const isOther = val === 'Other';
  const isNone = el.dataset.none === 'true';
  const inp = document.getElementById('oi-' + qId);
  const i = isOther ? arr.findIndex(v => v === 'Other' || v.startsWith('Other:')) : arr.indexOf(val);
  const allEls = document.querySelectorAll('[data-q="' + qId + '"]');
  if (i > -1) {
    arr.splice(i, 1);
    el.classList.remove('sel');
    if (isOther && inp) { inp.classList.remove('show'); inp.value = ''; }
    // Restore counter if noneOpt was deselected
    if (isNone && max) {
      const ctrRestore = document.getElementById('ctr-' + qId);
      if (ctrRestore) { ctrRestore.style.display = ''; ctrRestore.innerHTML = 'Selected: <b>0 / ' + max + '</b>'; }
    }
  } else {
    if (isNone) {
      // Clear everything else first
      answers[qId] = [val];
      allEls.forEach(e => e.classList.remove('sel'));
      el.classList.add('sel');
      if (inp) { inp.classList.remove('show'); inp.value = ''; }
      // Hide counter when noneOpt selected
      const ctrNone = document.getElementById('ctr-' + qId);
      if (ctrNone) ctrNone.style.display = 'none';
    } else {
      // Remove any none-type option if present
      allEls.forEach(e => {
        if (e.dataset.none === 'true') {
          const ni = answers[qId].indexOf(e.dataset.val);
          if (ni > -1) { answers[qId].splice(ni, 1); e.classList.remove('sel'); }
        }
      });
      const otherInArr = arr.some(v => v === 'Other' || v.startsWith('Other:'));
      const countable = arr.filter(v => v !== 'Other' && !v.startsWith('Other:')).length + (otherInArr ? 1 : 0);
      if (max && countable >= max) {
        const err = document.getElementById('err-' + qId);
        if (err) { err.textContent = 'Please select no more than ' + max + ' options.'; err.classList.add('show'); }
        return;
      }
      arr.push(val);
      el.classList.add('sel');
      if (isOther && inp) { inp.classList.add('show'); inp.focus(); }
    }
  }
  if (max) {
    const otherIn = arr.some(v => v === 'Other' || v.startsWith('Other:'));
    const displayCount = arr.filter(v => v !== 'Other' && !v.startsWith('Other:')).length + (otherIn ? 1 : 0);
    const ctr = document.getElementById('ctr-' + qId);
    if (ctr) ctr.innerHTML = 'Selected: <b>' + displayCount + ' / ' + max + '</b>';
  }
  if (arr.length > 0) clearErr(qId);
}

function setOtherText(qId, val, isMulti) {
  if (isMulti) {
    if (!answers[qId]) answers[qId] = [];
    const arr = answers[qId];
    // Replace either 'Other' or any existing 'Other: ...' with the new value
    const i = arr.findIndex(v => v === 'Other' || v.startsWith('Other:'));
    const newVal = val.trim() ? 'Other: ' + val : 'Other';
    if (i > -1) arr[i] = newVal;
    else arr.push(newVal);
  } else {
    answers[qId] = val.trim() ? 'Other: ' + val : 'Other';
  }
}

function pickScale(el) {
  const qId = el.dataset.q; const val = parseInt(el.dataset.val);
  answers[qId] = val;
  document.querySelectorAll('[data-sc="' + qId + '"]').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  clearErr(qId);
}

function setTextArr(qId, idx, val) {
  if (!answers[qId]) answers[qId] = [];
  answers[qId][idx] = val;
  clearErr(qId);
}

function mxMulti(el) {
  const qId = el.dataset.q; const row = el.dataset.row; const col = el.dataset.col;
  if (!answers[qId]) answers[qId] = {};
  if (!answers[qId][row]) answers[qId][row] = [];
  const arr = answers[qId][row];
  const i = arr.indexOf(col);
  const rowEls = document.querySelectorAll('[data-q="' + qId + '"][data-row="' + row + '"]');
  if (i > -1) {
    // Deselect
    arr.splice(i, 1);
    el.classList.remove('sel');
  } else {
    if (col === 'None') {
      // None selected — clear all other selections in this row
      answers[qId][row] = ['None'];
      rowEls.forEach(c => c.classList.remove('sel'));
      el.classList.add('sel');
    } else {
      // Brand selected — remove None if present
      const noneIdx = arr.indexOf('None');
      if (noneIdx > -1) {
        arr.splice(noneIdx, 1);
        rowEls.forEach(c => { if (c.dataset.col === 'None') c.classList.remove('sel'); });
      }
      arr.push(col);
      el.classList.add('sel');
    }
  }
  clearErr(qId);
}

function mxScale(el) {
  const qId = el.dataset.q; const row = el.dataset.row; const col = el.dataset.col;
  if (!answers[qId]) answers[qId] = {};
  answers[qId][row] = col;
  el.closest('tr').querySelectorAll('.mc.radio').forEach(c => c.classList.remove('sel'));
  el.classList.add('sel');
  clearErr(qId);
}

// ═══════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════
function render() {
  const id = cur();
  const q  = QS[id];
  const sc = document.getElementById('screen');
  const nav = document.getElementById('nav');

  // Progress bar
  let pct = 0;
  if (id === 'THANKYOU' || id === 'THANKYOU_ND') {
    pct = 100;
  } else if (id.startsWith('ND') || id === 'THANKYOU_ND') {
    // Non-drinker flow: ND1 is one screen so just show 80%
    pct = 80;
  } else {
    const mainIdx = MAIN_FLOW.findIndex(x => x === id);
    pct = mainIdx > 0 ? Math.round((mainIdx / TOTAL_MAIN) * 100) : 0;
  }
  document.getElementById('progress-bar-fill').style.width = pct + '%';
  document.getElementById('pct-label').textContent = (id !== 'WELCOME') ? pct + '%' : '';

  // Nav state
  const isEnd = id === 'THANKYOU' || id === 'THANKYOU_ND';
  nav.style.display = isEnd ? 'none' : 'flex';
  document.getElementById('btn-back').style.display = hist.length > 1 ? 'block' : 'none';
  const nextBtn = document.getElementById('btn-next');
  const isSubmit = id === 'Q19' || id === 'ND1';
  nextBtn.textContent = id === 'WELCOME' ? 'Start Survey →' : isSubmit ? 'Submit' : 'Continue →';

  if (!q) { sc.innerHTML = '<div id="screen"><p style="padding:30px">Error.</p></div>'; return; }

  if (q.type === 'welcome')     { sc.innerHTML = buildWelcome(); return; }
  if (q.type === 'thankyou')    { sc.innerHTML = buildThankyou(); return; }
  if (q.type === 'thankyou_nd') { sc.innerHTML = buildThankyouND(); return; }

  let h = '<div id="screen">';

  // Section banner (show when section changes or first question of section)
  if (q.sec) {
    h += `<div class="sec-banner">
      <div class="sec-code">${q.sec}</div>
      <div class="sec-info">
        <div class="sec-title">${q.secTitle}</div>
        ${q.secSub ? `<div class="sec-sub">${q.secSub}</div>` : ''}
      </div>
    </div>`;
  }

  if (q.info) h += `<div class="info-bar">${q.info}</div>`;

  // Build this question plus any grouped questions on same screen
  const screenQs = GROUPS[id] ? GROUPS[id].map(gid => QS[gid]).filter(Boolean).filter(sq => !sq.showIf || sq.showIf()) : [q];

  const tl = { single:'Select one', multi:'Select all that apply', text1:'Write your answer', textN:'Write below', scale10:'Scale 1–10', 'matrix-multi':'Select all that apply per row', 'matrix-scale':'Rate 1–5 per row' };

  screenQs.forEach((sq, idx) => {
    if (idx > 0) h += '<div style="border-top:1px solid #eee;margin:20px 0"></div>';
    h += `<div class="q-num">${sq.id}</div>`;
    h += `<div class="q-text">${esc(sq.text)}</div>`;
    const lbl = sq.max ? `Select up to ${sq.max}` : tl[sq.type];
    if (lbl) h += `<div class="q-type-label">[${lbl}]</div>`;
    if (sq.note) h += `<div class="q-note">${sq.note}</div>`;
    switch (sq.type) {
      case 'single':       h += buildSingle(sq); break;
      case 'multi':        h += buildMulti(sq); break;
      case 'text1':        h += buildText1(sq); break;
      case 'textN':        h += buildTextN(sq); break;
      case 'scale10':      h += buildScale10(sq); break;
      case 'matrix-multi': h += buildMatrixMulti(sq); break;
      case 'matrix-scale': h += buildMatrixScale(sq); break;
    }
    const errMsg = sq.type === 'matrix-multi' || sq.type === 'matrix-scale'
      ? 'Please answer every row before continuing.'
      : 'Please answer this question to continue.';
    h += `<div class="err" id="err-${sq.id}">${errMsg}</div>`;
  });

  h += '</div>';
  sc.innerHTML = h;
}

// ── Question type builders ──────────────────────────────────────────────
function buildSingle(q) {
  const saved = answers[q.id] || '';
  let h = '<div class="opts">';
  (q.opts || []).forEach(opt => {
    const isOther = opt === 'Other';
    const sel = saved === opt || (isOther && typeof saved === 'string' && saved.startsWith('Other:')) ? 'sel' : '';
    const otherVal = sel && isOther ? (saved.startsWith('Other: ') ? saved.slice(7) : '') : '';
    h += `<div class="opt ${sel}" data-q="${q.id}" data-val="${esc(opt)}" onclick="pickSingle(this)">
            <div class="opt-dot"></div>
            <div class="opt-lbl">${esc(opt)}</div>
          </div>`;
    if (isOther) {
      h += `<input class="other-input ${sel ? 'show' : ''}" id="oi-${q.id}" type="text" placeholder="Please specify…" value="${esc(otherVal)}"
              onclick="event.stopPropagation()" oninput="setOtherText('${q.id}',this.value,false)">`;
    }
  });
  h += '</div>';
  return h;
}

function buildMulti(q) {
  const saved = answers[q.id] || [];
  const max = q.max || null;
  let h = '';
  if (max) h += `<div class="sel-counter" id="ctr-${q.id}">Selected: <b>${saved.length} / ${max}</b></div>`;
  h += '<div class="opts">';
  (q.opts || []).forEach(opt => {
    const isOther = opt === 'Other';
    const sel = saved.some(v => v === opt || (isOther && v.startsWith('Other:'))) ? 'sel' : '';
    const otherVal = isOther ? (saved.find(v => v.startsWith('Other: ')) || '').replace('Other: ', '') : '';
    const isNoneOpt = q.noneOpts && q.noneOpts.includes(opt);
    h += `<div class="opt ${sel}" data-q="${q.id}" data-val="${esc(opt)}" ${max ? `data-max="${max}"` : ''} ${isNoneOpt ? 'data-none="true"' : ''} onclick="pickMulti(this)">
            <div class="opt-box"></div>
            <div class="opt-lbl">${esc(opt)}</div>
          </div>`;
    if (isOther) {
      h += `<input class="other-input ${sel ? 'show' : ''}" id="oi-${q.id}" type="text" placeholder="Please specify…" value="${esc(otherVal)}"
              onclick="event.stopPropagation()" oninput="setOtherText('${q.id}',this.value,true)">`;
    }
  });
  h += '</div>';
  return h;
}

function buildText1(q) {
  const saved = answers[q.id] || '';
  return `<div style="margin-top:12px">
    <input class="txt-inp" type="text" placeholder="${esc(q.ph || 'Your answer')}" value="${esc(saved)}"
      oninput="answers['${q.id}']=this.value;clearErr('${q.id}')">
  </div>`;
}

function buildTextN(q) {
  const saved = answers[q.id] || [];
  let h = '<div style="margin-top:12px">';
  (q.labels || []).forEach((lbl, i) => {
    h += `<div class="txt-row">
      <div class="txt-lbl">${esc(lbl)}</div>
      <input class="txt-inp" type="text" placeholder="${i === 0 && q.req ? 'Required' : 'Optional'}" value="${esc(saved[i] || '')}"
        oninput="setTextArr('${q.id}',${i},this.value)">
    </div>`;
  });
  h += '</div>';
  return h;
}

function buildScale10(q) {
  const saved = answers[q.id];
  let h = '<div class="scale-wrap">';
  for (let i = 1; i <= 10; i++) {
    h += `<div class="sc-btn ${saved === i ? 'sel' : ''}" data-sc="${q.id}" data-q="${q.id}" data-val="${i}" onclick="pickScale(this)">${i}</div>`;
  }
  h += '</div><div class="scale-ends"><span>Very negative</span><span>Very positive</span></div>';
  return h;
}

function buildMatrixMulti(q) {
  const saved = answers[q.id] || {};
  let h = '<div class="matrix-hint">← Swipe left/right to see all brands →</div>';
  h += '<div class="matrix-outer"><table class="mx"><thead><tr>';
  h += '<th>Attribute</th>';
  q.cols.forEach(c => h += `<th>${esc(c)}</th>`);
  h += '</tr></thead><tbody>';
  q.rows.forEach((row, ri) => {
    h += `<tr>`;
    h += `<td>${esc(row)}</td>`;
    q.cols.forEach(col => {
      const sel = ((saved[row] || []).includes(col)) ? 'sel' : '';
      h += `<td style="text-align:center"><div class="mc ${sel}" data-q="${q.id}" data-row="${esc(row)}" data-col="${esc(col)}" onclick="mxMulti(this)"></div></td>`;
    });
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  return h;
}

function buildMatrixScale(q) {
  const saved = answers[q.id] || {};
  let h = '<div class="matrix-hint">← Swipe left/right →</div>';
  h += '<div class="matrix-outer"><table class="mx"><thead><tr>';
  h += '<th>Attribute</th>';
  q.cols.forEach(c => h += `<th>${esc(c)}</th>`);
  h += '</tr></thead><tbody>';
  q.rows.forEach((row, ri) => {
    h += `<tr id="msr-${q.id}-${ri}">`;
    h += `<td>${esc(row)}</td>`;
    q.cols.forEach(col => {
      const sel = saved[row] === col ? 'sel' : '';
      h += `<td style="text-align:center"><div class="mc radio ${sel}" data-q="${q.id}" data-row="${esc(row)}" data-col="${esc(col)}" onclick="mxScale(this)"></div></td>`;
    });
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  return h;
}

// ── Static screens ──────────────────────────────────────────────────────
function buildWelcome() {
  return `<div class="welcome">
    <div class="wlc-title">Consumer Survey</div>
    <div class="wlc-sub">Energy Drinks &middot; Madrid 2026</div>
    <div class="wlc-intro">
      Welcome! This short survey helps us understand how people in Madrid consume energy drinks.
    </div>
  </div>`;
}

function buildThankyou() {
  return `<div class="thankyou">
    <div class="ty-icon">🎯</div>
    <div class="ty-title">Thank you for your time!</div>
  </div>`;
}

function buildThankyouND() {
  return `<div class="thankyou">
    <div class="ty-icon">🙏</div>
    <div class="ty-title">Thank you for your time!</div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════════
// SUBMIT
// ═══════════════════════════════════════════════════════════════════════
function submitSurvey(thankyouId) {
  hist.push(thankyouId);
  render();

  // Build canonical schema — all possible keys in fixed order
  const schema = ['Timestamp','Respondent_Type',
    'Q1','Q2','Q3','Q4',
    'ND1','ND2','ND3',
    'Q5','Q6','Q7','Q8','Q9','Q10','Q11_1','Q11_2','Q11_3','Q11_4','Q11_5',
    'Q12','Q13','Q14','Q15','Q16','Q17',
  ];
  // Add Q18 matrix rows (brand image)
  const q18rows = (QS['Q18']||{rows:[]}).rows;
  q18rows.forEach(r => schema.push('Q18__' + r.replace(/[^a-zA-Z0-9]/g,'_').slice(0,40)));
  // Add Q19 matrix rows (RB ratings)
  const q19rows = (QS['Q19']||{rows:[]}).rows;
  q19rows.forEach(r => schema.push('Q19__' + r.replace(/[^a-zA-Z0-9]/g,'_').slice(0,40)));
  schema.push('Q20','Q21','Q22','Q23');

  // Start with all keys set to empty
  const flat = {};
  schema.forEach(k => flat[k] = '');
  flat.Timestamp = new Date().toISOString();
  flat.Respondent_Type = thankyouId === 'THANKYOU_ND' ? 'Non-drinker' : 'Consumer';

  // Fill in actual answers
  Object.entries(answers).forEach(([key, val]) => {
    if (key === 'Q11' && Array.isArray(val)) {
      // Store each ranked brand in its own column
      ['Q11_1','Q11_2','Q11_3','Q11_4','Q11_5'].forEach((col, i) => {
        flat[col] = (val[i] || '').trim();
      });
    } else if (typeof val === 'object' && !Array.isArray(val) && val !== null) {
      Object.entries(val).forEach(([row, sel]) => {
        const k = key + '__' + row.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 40);
        flat[k] = Array.isArray(sel) ? sel.join(' | ') : (sel || '');
      });
    } else if (Array.isArray(val)) {
      flat[key] = val.join(' | ');
    } else {
      flat[key] = val || '';
    }
  });

  if (SHEET_URL && SHEET_URL !== 'PASTE_YOUR_APPS_SCRIPT_URL_HERE') {
    const body = new URLSearchParams();
    body.append('data', JSON.stringify(flat));
    fetch(SHEET_URL, {
      method:  'POST',
      mode:    'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body:    body.toString()
    }).catch(e => console.warn('Submit error:', e));
  } else {
    console.log('Survey complete (no URL set). Answers:', flat);
  }
}

// ═══════════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════════
function esc(s)  { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ═══════════════════════════════════════════════════════════════════════
// GROUPED SCREENS — these question pairs render together on one screen
// ═══════════════════════════════════════════════════════════════════════
const GROUPS = {
  'Q1':  ['Q1','Q2','Q3'],
  'Q5':  ['Q5','Q6','Q9','Q10'],
  'Q7':  ['Q7','Q8'],
  'Q12': ['Q12','Q13'],
  'Q14': ['Q14','Q15'],
  'Q16': ['Q16','Q17'],
  'Q19': ['Q19','Q20','Q21','Q22','Q23'],
  'ND1': ['ND1','ND2','ND3'],
};
// Questions that are secondary in a group (skip as standalone screens)
const GROUP_SECONDARY = new Set(['Q2','Q3','Q6','Q9','Q10','Q8','Q13','Q15','Q17','Q20','Q21','Q22','Q23','ND2','ND3']);

// ═══════════════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════════════
render();
</script>
